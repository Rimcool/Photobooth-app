<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cute Snaps Photobooth 🌼</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Poppins:wght@600&display=swap">
  <style>
    :root {
      --rose: #f472b6;
      --pink: #ec4899;
      --lavender: #c084fc;
      --cream: #fff8fb;
    }

    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at 10% 20%, #ffd6ec, #ffc1df 45%, #f9b7ff 100%);
      font-family: 'Comic Neue', cursive;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: 
        radial-gradient(circle at 25% 25%, #fff2 2px, transparent 3px),
        radial-gradient(circle at 75% 75%, #fff2 2px, transparent 3px);
      background-size: 56px 56px;
    }
    .container {
      text-align: center;
      background: rgba(255,255,255,0.62);
      padding: 60px 80px;
      border-radius: 40px;
      border: 8px solid #fff;
      box-shadow: 0 20px 50px rgba(236, 72, 153, 0.25);
    }
    h1 { font-size: 5rem; color: var(--pink); text-shadow: 5px 5px 0 #fff, 10px 10px 0 #f9a8d4; margin-bottom: 20px; }
    p  { font-size: 2rem; margin: 20px 0; color: #7a285e; }
    button {
      font-size: 2.2rem;
      padding: 20px 80px;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, var(--lavender), var(--rose));
      color: white;
      box-shadow: 0 12px 0 #be185d;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:active { transform: translateY(6px); box-shadow: 0 6px 0 #be185d; }
    .daisy { font-size: 140px; margin-bottom: 10px; animation: float 5s infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="daisy">🎀🌸</div>
    <h1>Welcome, Cutie!</h1>
    <p>Tap to start your dreamy photo session ✨</p>
    <button onclick="window.electronAPI.navigate('capture')">Start Photo Session</button>
    <p style="margin-top:40px; font-size:1.8rem;">pink vibes only 💗</p>
  </div>

  <script>
    // No extra JS needed here – preload handles navigation
  </script>
</body>
</html>
