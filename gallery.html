<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ta-Da! Your Cute Snaps 🌟</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Poppins:wght@600&display=swap">
  <style>
    body {
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 15% 20%, #ffd7ea 0 16%, transparent 28%),
        radial-gradient(circle at 82% 25%, #ffe3f6 0 15%, transparent 28%),
        radial-gradient(circle at 90% 10%, var(--eid-gold) 0 2px, transparent 4px),
        linear-gradient(160deg, #ffe7f4, #ffeefc 55%, #fff4ff);
      font-family: 'Comic Neue', cursive;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding: 24px;
      color:#5b2146;
      position: relative;
    }
    body::before {
      content: '🌙';
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 40px;
      color: var(--eid-moon);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      animation: float 4s infinite;
    }
    h1 {
      font-size:4.3rem;
      color:#ec4899;
      text-shadow:5px 5px 0 #fff, 9px 9px 0 #f9a8d4;
      margin-bottom:10px;
      text-align:center;
      line-height: 1;
    }
    .eid-subtitle {
      font-size: 1.8rem;
      color: #6d28d9;
      margin-bottom: 20px;
      font-style: italic;
    }
    .strip {
      display:flex;
      flex-direction:column;
      gap:16px;
      margin:24px 0;
      background: rgba(255,255,255,.65);
      padding: 14px;
      border-radius: 20px;
      border: 3px solid #fbcfe8;
      box-shadow: 0 12px 28px rgba(236,72,153,.2);
      position: relative;
    }
    .strip::after {
      content: 'Eid Mubarak! 🌙';
      position: absolute;
      bottom: -10px;
      right: 20px;
      font-size: 1.2rem;
      color: #6d28d9;
      font-family: 'Poppins', sans-serif;
      font-weight: bold;
    }
    .strip img {
      width:280px;
      border:10px solid #fff;
      border-radius:20px;
      box-shadow:0 10px 22px rgba(236,72,153,0.25);
    }
    .buttons {
      display:flex;
      gap:18px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      font-size:1.2rem;
      padding:14px 28px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      color:white;
      font-family: 'Poppins', sans-serif;
      box-shadow:0 10px 0 rgba(0,0,0,.2);
    }
    button.eid-action {
      border: 2px solid var(--eid-gold);
      box-shadow: 0 10px 0 #b46900;
      background: linear-gradient(135deg, #fff8e6, #fff0cc);
      color: #8a5a00;
    }
    button.eid-action:active {
      box-shadow: 0 6px 0 #5d3a00;
    }
    #retake { background:linear-gradient(135deg, #fb7185, #f43f5e); }
    #save { background:linear-gradient(135deg, #c084fc, #a855f7); }
    #share { background:linear-gradient(135deg, #f472b6, #ec4899); }
    #print { background:linear-gradient(135deg, #fda4af, #fb7185); }
    button:active { transform:translateY(6px); box-shadow:0 6px 0; }
  </style>
</head>
<body>
    <h1>Ta-Da!<br>Your Pretty<br>Photo Strip 💕</h1>
    <div class="eid-subtitle">Eid Mubarak! ✨</div>
  <div class="strip" id="photoStrip"></div>

    <div class="buttons" style="display:flex; gap:20px; margin-top:20px;">
      <button id="retake">Retake One More Time</button>
      <button id="save" class="eid-action">Save 💾</button>
      <button id="share" class="eid-action">Share 📤</button>
      <button id="print" class="eid-action">Print 🖨️</button>
    </div>

  <script src="gallery.js"></script>
</body>
</html>
